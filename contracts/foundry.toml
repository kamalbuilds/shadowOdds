[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "prague"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@pyth/=lib/pyth-sdk-solidity/",
]

[rpc_endpoints]
monad = "https://rpc.monad.xyz"
monad_testnet = "https://testnet-rpc.monad.xyz"
base = "https://mainnet.base.org"

[etherscan]
monad = { key = "verifykey", url = "https://sourcify-api-monad.blockvision.org", chain = 143 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
